services:
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        for b in lakehouse bronze silver gold; do
          mc mb --ignore-existing local/$$b
        done
        echo "Buckets ready: lakehouse, bronze, silver, gold"

  spark-init:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: lakehouse-spark-init
    user: root
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /home/jovyan/.ivy2 /home/jovyan/.cache
        chown -R 1000:100 /home/jovyan/.ivy2 /home/jovyan/.cache
    volumes:
      - ivy-cache:/home/jovyan/.ivy2
      - ipython-cache:/home/jovyan/.cache

  spark:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: lakehouse-spark
    # Let start.sh make the mounted cache volumes writable for jovyan before it
    # drops privileges to run Jupyter.
    user: root
    depends_on:
      minio-init:
        condition: service_completed_successfully
      spark-init:
        condition: service_completed_successfully
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      JUPYTER_TOKEN: lakehouse
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      PYTHONPATH: /workspace/scripts
    volumes:
      - ../:/workspace
      # Ivy cache survives restarts → Maven JARs only download once
      - ivy-cache:/home/jovyan/.ivy2
      - ipython-cache:/home/jovyan/.cache
    working_dir: /workspace
    command:
      - bash
      - -c
      - |
        set -e
        echo ">> Installing Python deps (cached after first run)…"
        pip install --quiet --user \
          delta-spark==3.2.0 \
          jupytext==1.16.4 \
          faker==30.3.0
        echo ">> Syncing Spark notebooks (.py -> .ipynb)…"
        cd /workspace/notebooks-spark && for f in *.py; do
          python -m jupytext --to notebook --update "$$f" 2>/dev/null || python -m jupytext --to notebook "$$f"
        done
        echo ">> Starting Jupyter (token: lakehouse)…"
        cd /workspace/notebooks-spark
        start-notebook.py \
          --IdentityProvider.token=lakehouse \
          --ServerApp.root_dir=/workspace/notebooks-spark

volumes:
  minio-data:
  ivy-cache:
  ipython-cache:
